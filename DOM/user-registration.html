<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <section class="d-flex" style="height: 100vh;">
        <form action="user-data.html" class="w-75 bg-success mx-auto my-auto p-4">
            <h3 class="text-white">Please provide your basic info</h3>
            <input class="form-control my-2" type="text" placeholder="First Name" name="firstName">
            <input class="form-control my-2" type="text" placeholder="Last Name" name="lastName">
            <input class="form-control my-2" type="email" placeholder="Email" name="email">
            <textarea class="form-control my-2" placeholder="Address of contact" name="address"></textarea>
            <input class="btn btn-dark w-100" type="submit" >
        </form>
    </section>
</body>
</html>
