<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do list app</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <div class="row" style="height: 100vh;">
            <div class="col d-flex align-items-center">
                <form id="add-task-form" class="border shadow bg-light p-4" style="height: fit-content;width: 80%;" >
                    <h4>Create New Task</h4>
                    <input class="form-control" type="text" placeholder="task description" name="description">
                    <select class="form-control" name="status" >
                        <option value="">-- select status --</option>
                        <option value="open">open</option>
                        <option value="inprogress">inprogress</option>
                        <option value="completed">completed</option>
                        <option value="closed">closed</option>
                    </select>
                    <input class="btn btn-dark" type="submit" value="Save task">
                </form>
            </div>
            <div class="col p-4 ">
                <h4>My Task List</h4>
               <table id="my-task-list" class="table border">
                    <tr>
                        <th>decription</td>
                        <th>status</td>
                    </tr>
                    <!-- <tr>
                        <td>demo task 1</td>
                        <td>open</td>
                    </tr>
                      <tr>
                        <td>demo task 2</td>
                        <td>closed</td>
                    </tr> -->
                   
               </table>
            </div>
        </div>
    </div>
</body>
<script>
      var form = document.getElementById("add-task-form")
      var taskList = document.getElementById("my-task-list")
      form.addEventListener("submit",function (event){
            event.preventDefault()
            const formdata = new FormData(event.target)
            // console.log(formdata.get("description") + " "+formdata.get("status"))
            taskList.innerHTML = taskList.innerHTML+`<tr>
                        <td>${formdata.get("description")}</td>
                        <td>${formdata.get("status")}</td>
                    </tr>`
      })
</script>
</html>
