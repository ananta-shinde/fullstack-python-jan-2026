<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multipart form demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <section style="">
        <div id="part1" class="card bg-success w-50 text-center mx-auto  my-5 p-4">
            <h4>Basic information :</h4>
                <input  class="form-control my-2" type="text" placeholder="Enter name" name="name"  >
                <input class="form-control my-2" type="email" placeholder="Enter email">
                <input class="form-control my-2" type="password" placeholder="Enter password">
                <input class="form-control my-2" type="text" placeholder="Enter contact">
                <div class="d-flex justify-content-between">
                    <button class="btn btn-dark w-25 disabled" onclick="backClicked()">back</button>
                    <button class="btn btn-dark w-25" onclick="nextClicked(1)">next</button>
                </div>

        </div>
        <div id="part2" class="card bg-success w-50 text-center mx-auto  my-5 p-4" style="display: none;">
            <h4>Educational information :</h4>
                <input  class="form-control my-2" type="text" placeholder="College name"  >
                <select class="form-control my-2" name="" id="">
                    <option value="">-- select course --</option>
                    <option value="">BSC</option>
                    <option value="">BCA</option>
                    <option value="">MSC</option>
                    <option value="">MCA</option>
                </select>
                <select class="form-control my-2" name="" id="">
                    <option value="">-- select year --</option>
                    <option value="">1st</option>
                    <option value="">2nd</option>
                    <option value="">3rd</option>
                </select>
                <input class="form-control my-2" type="text" placeholder="Enter CGPA">
                <div class="d-flex justify-content-between">
                    <button class="btn btn-dark w-25" onclick="backClicked()">back</button>
                    <button class="btn btn-dark w-25" onclick="nextClicked(2)">next</button>
                </div>
        </div>
    </section>
</body>
<script>
      var inputs = document.getElementsByTagName("input")
      var selections = document.getElementsByTagName("select")
      function nextClicked(part){
        if(part == 1){
            var name = inputs[0].value
            var email = inputs[1].value
            var password = inputs[2].value
            var contact = inputs[3].value
            document.getElementById("part1").style.display = "none"
            document.getElementById("part2").style.display = "block"
        }
        if(part == 2){
            var college = inputs[4].value
            var cgpa = inputs[5].value
            var course = selections[0].value
            var year = selections[1].value
        }
      }

      function backClicked(){

      }
</script>
</html>
